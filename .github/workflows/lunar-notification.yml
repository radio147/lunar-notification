name: Lunar Calendar Notification

on:
  schedule:
    # 每小时的第0分钟执行一次（整点）
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install axios
        run: |
          npm init -y
          npm install axios
      
      - name: Fetch Data and Push Notification
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          const TIANXING_KEY = 'ddb46cc2067829e975734869fdf36969'; 
          const SERVERCHAN_KEY = 'SCT319191TZCCMQhVq74ajaCWlXYpm9FYE';
          
          const STATE_FILE = 'last_notification.txt';

          // 获取严格的北京时间
          function getBeijingTime() {
            const now = new Date();
            // 使用Intl.DateTimeFormat确保获取北京时间
            const beijingTimeStr = new Intl.DateTimeFormat('zh-CN', {
              timeZone: 'Asia/Shanghai',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).format(now);
            
            // 解析北京时间字符串
            const [dateStr, timeStr] = beijingTimeStr.split(' ');
            const [year, month, day] = dateStr.split('/').map(Number);
            const [hour, minute, second] = timeStr.split(':').map(Number);
            
            return new Date(year, month - 1, day, hour, minute, second);
          }

          // 计算今天是今年的第几天
          function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
          }

          // 计算今天是本周的第几天（0-6，0是周日）并返回七曜
          function getJapaneseDayOfWeek(date) {
            const day = date.getDay();
            const sevenLights = ['日曜', '月曜', '火曜', '水曜', '木曜', '金曜', '土曜'];
            return sevenLights[day];
          }

          async function main() {
            try {
              // 严格使用北京时间
              const beijingTime = getBeijingTime();
              
              // 格式化北京时间的日期字符串（用于API请求）
              const year = beijingTime.getFullYear();
              const month = String(beijingTime.getMonth() + 1).padStart(2, '0');
              const day = String(beijingTime.getDate()).padStart(2, '0');
              const dateStr = `${year}-${month}-${day}`;
              
              // 获取北京时间的小时
              const hour = beijingTime.getHours();
              
              // 计算今天是当天的第几个小时 (1-24)
              const hourIndex = hour + 1; // 0点=1/24, 1点=2/24, ... 23点=24/24
              
              // 计算今天是当年的第几天
              const dayOfYear = getDayOfYear(beijingTime);
              
              // 获取七曜
              const japaneseWeekDay = getJapaneseDayOfWeek(beijingTime);
              
              // 构建当前时间段的key（用于去重）- 使用北京时间
              const currentKey = dateStr + '-' + hour;
              
              // 检查是否已经推送过
              let lastKey = '';
              try {
                if (fs.existsSync(STATE_FILE)) {
                  lastKey = fs.readFileSync(STATE_FILE, 'utf8').trim();
                }
              } catch (e) {
                console.log('无法读取状态文件，将继续执行');
              }
              
              // 如果这个时间段已经推送过，则跳过
              if (lastKey === currentKey) {
                console.log('⏭️ 当前整点已推送过，跳过执行');
                return;
              }
              
              console.log('📅 北京时间: ' + beijingTime.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }));
              console.log('📅 正在查询日期: ' + dateStr);
              console.log('⏰ 当前进度: 第 ' + hourIndex + '/24 小时');
              
              const lunarRes = await axios.get('https://apis.tianapi.com/lunar/index', {
                params: { key: TIANXING_KEY, date: dateStr }
              });
              
              if (lunarRes.data.code !== 200) {
                throw new Error('API 返回错误: ' + (lunarRes.data.msg || '未知错误'));
              }
              
              const r = lunarRes.data.result;
              
              // 打印返回的数据，方便调试
              console.log('✅ API返回成功');
              console.log('农历:', r.lmonthname + r.lubarmonth + r.lunarday);
              console.log('干支:', r.tiangandizhiyear, r.tiangandizhimonth, r.tiangandizhiday);
              
              // 拼接农历日期
              const lunarDate = r.lmonthname + r.lubarmonth + r.lunarday;
              
              // 根据时间段选择不同的emoji
              let timeEmoji = '🕐';
              if (hour >= 5 && hour < 8) timeEmoji = '🌅';  // 清晨
              else if (hour >= 8 && hour < 12) timeEmoji = '☀️'; // 上午
              else if (hour >= 12 && hour < 14) timeEmoji = '🍚'; // 中午
              else if (hour >= 14 && hour < 18) timeEmoji = '🌤️'; // 下午
              else if (hour >= 18 && hour < 20) timeEmoji = '🌆'; // 傍晚
              else if (hour >= 20 && hour < 24) timeEmoji = '🌙'; // 晚上
              else timeEmoji = '🌃'; // 深夜
              
              // 生成进度条
              const progressBarLength = 20;
              const filledLength = Math.floor((hourIndex / 24) * progressBarLength);
              const progressBar = '█'.repeat(filledLength) + '░'.repeat(progressBarLength - filledLength);
              
              // 标题：包含人生任务"贰伍"、进度、七曜、农历
              // 示例：🌅 [8/24] 7:00 贰伍 土曜 · 正月廿三
              const title = `${timeEmoji} [${hourIndex}/24] ${hour}:00 贰伍 ${japaneseWeekDay} · ${lunarDate}`;
              
              // 处理宜忌
              const fitness = r.fitness ? r.fitness.split('.').join('、') : '无';
              const taboo = r.taboo ? r.taboo.split('.').join('、') : '无';
              
              // 计算当天剩余小时数
              const remainingHours = 24 - hourIndex;
              
              const content = 
                '📊 **今日时间进度**\\n' +
                '┌────────────────────\\n' +
                `│ ${progressBar} ${Math.round((hourIndex/24)*100)}%\\n` +
                `│ 第 ${hourIndex}/24 小时\\n` +
                `│ 剩余 ${remainingHours} 小时\\n` +
                '└────────────────────\\n\\n' +
                
                '🎯 **人生任务**\\n' +
                '今日运动目标：**贰拾伍分钟 (25min)**\\n' +
                '时刻提醒：**贰伍**\\n\\n' +
                
                '📅 **农历信息**\\n' +
                '公历：**' + dateStr + '** (' + japaneseWeekDay + ')\\n' +
                '农历：**' + lunarDate + '**\\n' +
                '干支：' + r.tiangandizhiyear + '年 ' + r.tiangandizhimonth + '月 ' + r.tiangandizhiday + '日\\n' +
                '生肖：🐴 ' + r.shengxiao + '\\n' +
                '冲煞：' + r.chongsha + '\\n' +
                '胎神：' + r.taishen + '\\n\\n' +
                
                '✅ **宜**：' + fitness + '\\n' +
                '❌ **忌**：' + taboo + '\\n\\n' +
                
                '✨ **其他信息**\\n' +
                '彭祖百忌：' + r.pengzu + '\\n' +
                '星宿：' + r.xingsu + '\\n' +
                '五行：' + r.wuxingnayear + ' | ' + r.wuxingnamonth + ' | ' + r.wuxingjiazi + '\\n\\n' +
                
                '⏰ **时间标记**\\n' +
                '推送时间：' + hour + ':00 (北京时间)\\n' +
                '当日序号：' + hourIndex + '/24\\n' +
                '年度第：' + dayOfYear + '天\\n' +
                '七曜：' + japaneseWeekDay + '\\n\\n' +
                
                '💪 _记得完成今日贰拾伍分钟运动任务！_\\n' +
                '💫 _由 GitHub 机器人自动推送，记录时间的每一刻_';
              
              console.log('📤 正在发送通知...');
              
              const pushRes = await axios.post('https://sctapi.ftqq.com/' + SERVERCHAN_KEY + '.send', null, {
                params: {
                  title: title,
                  desp: content,
                  channel: 9 
                }
              });

              if (pushRes.data.code === 0) {
                console.log('✅ 推送成功！');
                // 保存当前时间段key
                fs.writeFileSync(STATE_FILE, currentKey);
              } else {
                throw new Error('ServerChan 返回错误: ' + pushRes.data.message);
              }

            } catch (error) {
              console.error('❌ 运行失败:', error.message);
              throw error;
            }
          }

          main();
          "
