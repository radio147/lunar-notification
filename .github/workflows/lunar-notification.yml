name: 农历人生追踪

on:
  schedule:
    # 每半小时执行一次：每天的0:00, 0:30, 1:00, 1:30 ... 23:30
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 安装Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 安装依赖
        run: |
          npm init -y
          npm install axios lunar-javascript@1.6.12
      
      - name: 生成农历数据
        id: prepare
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          const Lunar = require('lunar-javascript');
          const Solar = Lunar.Solar;
          
          // 获取北京时间
          function getBeijingTime() {
            const now = new Date();
            const beijingTimeStr = new Intl.DateTimeFormat('zh-CN', {
              timeZone: 'Asia/Shanghai',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).format(now);
            
            const [dateStr, timeStr] = beijingTimeStr.split(' ');
            const [year, month, day] = dateStr.split('/').map(Number);
            const [hour, minute, second] = timeStr.split(':').map(Number);
            
            return new Date(year, month - 1, day, hour, minute, second);
          }

          // 农历日期转数字
          function chineseDayToNumber(dayStr) {
            const dayMap = {
              '初一':1,'初二':2,'初三':3,'初四':4,'初五':5,
              '初六':6,'初七':7,'初八':8,'初九':9,'初十':10,
              '十一':11,'十二':12,'十三':13,'十四':14,'十五':15,
              '十六':16,'十七':17,'十八':18,'十九':19,'二十':20,
              '廿一':21,'廿二':22,'廿三':23,'廿四':24,'廿五':25,
              '廿六':26,'廿七':27,'廿八':28,'廿九':29,'三十':30
            };
            return dayMap[dayStr] || 1;
          }

          // 月相Emoji
          function getMoonEmoji(dayNum) {
            if (dayNum === 1) return '🌑';
            else if (dayNum <= 3) return '🌒';
            else if (dayNum <= 7) return '🌓';
            else if (dayNum === 8) return '🌓';
            else if (dayNum <= 14) return '🌔';
            else if (dayNum === 15) return '🌕';
            else if (dayNum <= 22) return '🌖';
            else if (dayNum === 23) return '🌗';
            else if (dayNum <= 27) return '🌘';
            else return '🌑';
          }

          // 人生进度
          function calculateLifeProgress(currentDate) {
            const birthDate = new Date('1995-01-22T00:00:00');
            const lunarMonthLength = 29.5306;
            const deathDate = new Date(birthDate.getFullYear() + 75, birthDate.getMonth(), birthDate.getDate());
            
            if (currentDate < birthDate) {
              return { monthsPassed: 0, totalMonths: 0, percent: 0 };
            }
            
            const totalLunarMonths = Math.floor((deathDate - birthDate) / (1000 * 60 * 60 * 24) / lunarMonthLength);
            const monthsPassed = Math.floor((currentDate - birthDate) / (1000 * 60 * 60 * 24) / lunarMonthLength) + 1;
            const percent = ((monthsPassed / totalLunarMonths) * 100).toFixed(1);
            
            return { monthsPassed, totalMonths: totalLunarMonths, percent };
          }

          // 七曜
          function getJapaneseDayOfWeek(date) {
            const day = date.getDay();
            const sevenLights = ['日曜', '月曜', '火曜', '水曜', '木曜', '金曜', '土曜'];
            return sevenLights[day];
          }

          async function main() {
            try {
              const beijingTime = getBeijingTime();
              
              const year = beijingTime.getFullYear();
              const month = String(beijingTime.getMonth() + 1).padStart(2, '0');
              const day = String(beijingTime.getDate()).padStart(2, '0');
              const dateStr = \`\${year}-\${month}-\${day}\`;
              
              const hour = beijingTime.getHours();
              const minute = beijingTime.getMinutes();
              
              // 计算是当天的第几个半小时 (1-48)
              // 0:00 = 第1个半小时, 0:30 = 第2个, 1:00 = 第3个... 23:30 = 第48个
              const halfHourIndex = hour * 2 + (minute === 0 ? 1 : 2);
              
              // 格式化时间显示
              const timeStr = \`\${hour}:\${minute === 0 ? '00' : '30'}\`;
              
              // 计算农历
              const solar = Solar.fromDate(beijingTime);
              const lunar = solar.getLunar();
              
              const lunarYear = lunar.getYearInGanZhi();
              const lunarMonthName = lunar.getMonthInChinese();
              const lunarDayName = lunar.getDayInChinese();
              
              let lunarMonthNum = lunar.getMonth();
              if (lunarMonthNum < 0) lunarMonthNum = Math.abs(lunarMonthNum);
              
              const lunarDayNum = chineseDayToNumber(lunarDayName);
              const moonEmoji = getMoonEmoji(lunarDayNum);
              
              const festivals = lunar.getFestivals();
              const gregorianFestivals = solar.getFestivals();
              const jieQi = lunar.getJieQi();
              const shengxiao = lunar.getYearShengXiao();
              
              const lifeProgress = calculateLifeProgress(beijingTime);
              const japaneseWeekDay = getJapaneseDayOfWeek(beijingTime);
              
              // 时间进度条 (基于半小时进度)
              const progressBarLength = 20;
              const filledLength = Math.floor((halfHourIndex / 48) * progressBarLength);
              const progressBar = '█'.repeat(filledLength) + '░'.repeat(progressBarLength - filledLength);
              
              // 月进度
              const monthProgress = (lunarDayNum / 30 * 100).toFixed(1);
              const monthProgressBar = '█'.repeat(Math.floor(lunarDayNum/3)) + '░'.repeat(10 - Math.floor(lunarDayNum/3));
              
              // 年进度
              const yearProgress = (((lunarMonthNum - 1 + lunarDayNum / 30) / 12) * 100).toFixed(1);
              const yearProgressBar = '█'.repeat(Math.floor((lunarMonthNum - 1 + lunarDayNum/30)/1.2)) + '░'.repeat(10 - Math.floor((lunarMonthNum - 1 + lunarDayNum/30)/1.2));
              
              // 标题：显示 [x/48] 的进度
              const title = \`\${moonEmoji} [\${halfHourIndex}/48] \${timeStr} 贰伍 \${japaneseWeekDay} · \${lunarMonthName}\${lunarDayName}\`;
              
              const content = 
                '📊 **今日时间进度**\\n' +
                '┌────────────────────\\n' +
                '│ ' + progressBar + ' ' + Math.round((halfHourIndex/48)*100) + '%\\n' +
                '│ 第 ' + halfHourIndex + '/48 个半小时\\n' +
                '│ 剩余 ' + (48 - halfHourIndex) + ' 个半小时\\n' +
                '└────────────────────\\n\\n' +
                
                '🎯 **人生任务**\\n' +
                '今日运动目标：**贰拾伍分钟 (25min)**\\n' +
                '时刻提醒：**贰伍**\\n\\n' +
                
                '🌙 **人生进度**\\n' +
                '出生：1995-01-22\\n' +
                '第 ' + lifeProgress.monthsPassed + '/' + lifeProgress.totalMonths + ' 个农历月\\n' +
                '已完成：' + lifeProgress.percent + '%\\n' +
                '┌────────────\\n' +
                '│ ' + '█'.repeat(Math.floor(lifeProgress.percent/5)) + '░'.repeat(20 - Math.floor(lifeProgress.percent/5)) + ' ' + lifeProgress.percent + '%\\n' +
                '└────────────\\n\\n' +
                
                '📅 **农历信息**\\n' +
                '公历：**' + dateStr + '** (' + japaneseWeekDay + ')\\n' +
                '农历：**' + lunarYear + '年 ' + lunarMonthName + lunarDayName + '** ' + moonEmoji + '\\n' +
                '生肖：🐴 ' + shengxiao + '\\n' +
                '节气：' + (jieQi || '无') + '\\n\\n' +
                
                '📊 **月进度**\\n' +
                '┌────────────────────\\n' +
                '│ ' + monthProgressBar + ' ' + monthProgress + '%\\n' +
                '│ ' + lunarDayName + ' / 三十\\n' +
                '└────────────────────\\n\\n' +
                
                '📊 **年进度**\\n' +
                '┌────────────────────\\n' +
                '│ ' + yearProgressBar + ' ' + yearProgress + '%\\n' +
                '│ 第' + lunarMonthNum + '月 / 十二月\\n' +
                '└────────────────────\\n\\n' +
                
                '🎉 **节日**\\n' +
                '农历节日：' + (festivals.length > 0 ? festivals.join('、') : '无') + '\\n' +
                '公历节日：' + (gregorianFestivals.length > 0 ? gregorianFestivals.join('、') : '无') + '\\n\\n' +
                
                '⏰ **时间标记**\\n' +
                '推送时间：' + timeStr + ' (北京时间)\\n' +
                '当日序号：' + halfHourIndex + '/48\\n' +
                '年度第：' + Math.floor((beijingTime - new Date(beijingTime.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24)) + '天\\n' +
                '七曜：' + japaneseWeekDay + '\\n\\n' +
                
                '💪 _记得完成今日贰拾伍分钟运动任务！_\\n' +
                '💫 _KTBFFH - 我的农历人生追踪_';
              
              fs.writeFileSync('email_content.txt', title + '\\n\\n' + content);
              
            } catch (error) {
              console.error('❌ 运行失败:', error.message);
              throw error;
            }
          }

          main();
          "
      
      - name: 发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 587
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: 农历人生追踪 - [${{ github.event_name == 'schedule' && '自动' || '手动' }}]
          to: 1203402652@qq.com
          from: 农历人生机器人
          body: file://email_content.txt
          content_type: text/plain
