name: 更漏子 - 时之印记

on:
  schedule:
    # 每半小时执行一次：每天的0:00, 0:30, 1:00, 1:30 ... 23:30
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 安装依赖
        run: |
          npm init -y
          npm install axios lunar-javascript@1.6.12
      
      - name: 生成农历数据
        id: prepare
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          const Lunar = require('lunar-javascript');
          const Solar = Lunar.Solar;
          const LunarMonth = Lunar.LunarMonth;
          
          // 获取北京时间
          function getBeijingTime() {
            const now = new Date();
            const beijingTimeStr = new Intl.DateTimeFormat('zh-CN', {
              timeZone: 'Asia/Shanghai',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).format(now);
            
            const [dateStr, timeStr] = beijingTimeStr.split(' ');
            const [year, month, day] = dateStr.split('/').map(Number);
            const [hour, minute, second] = timeStr.split(':').map(Number);
            
            return new Date(year, month - 1, day, hour, minute, second);
          }

          // 农历日期转数字
          function chineseDayToNumber(dayStr) {
            const dayMap = {
              '初一':1,'初二':2,'初三':3,'初四':4,'初五':5,
              '初六':6,'初七':7,'初八':8,'初九':9,'初十':10,
              '十一':11,'十二':12,'十三':13,'十四':14,'十五':15,
              '十六':16,'十七':17,'十八':18,'十九':19,'二十':20,
              '廿一':21,'廿二':22,'廿三':23,'廿四':24,'廿五':25,
              '廿六':26,'廿七':27,'廿八':28,'廿九':29,'三十':30
            };
            return dayMap[dayStr] || 1;
          }

          // 月相Emoji
          function getMoonEmoji(dayNum) {
            if (dayNum === 1) return '🌑';
            else if (dayNum <= 3) return '🌒';
            else if (dayNum <= 7) return '🌓';
            else if (dayNum === 8) return '🌓';
            else if (dayNum <= 14) return '🌔';
            else if (dayNum === 15) return '🌕';
            else if (dayNum <= 22) return '🌖';
            else if (dayNum === 23) return '🌗';
            else if (dayNum <= 27) return '🌘';
            else return '🌑';
          }

          // 人生进度 - 修正版
          function calculateLifeProgress(currentDate) {
            const birthDate = new Date('1995-01-22T00:00:00');
            const lunarMonthLength = 29.5306;
            const deathDate = new Date(birthDate.getFullYear() + 75, birthDate.getMonth(), birthDate.getDate());
            
            const daysPassed = (currentDate - birthDate) / (1000 * 60 * 60 * 24);
            const completeMonthsPassed = Math.floor(daysPassed / lunarMonthLength);
            const currentMonthIndex = completeMonthsPassed + 1;
            const daysInCurrentMonth = daysPassed % lunarMonthLength;
            const monthProgress = (daysInCurrentMonth / lunarMonthLength * 100).toFixed(1);
            const totalLunarMonths = Math.floor((deathDate - birthDate) / (1000 * 60 * 60 * 24) / lunarMonthLength);
            const percent = ((currentMonthIndex / totalLunarMonths) * 100).toFixed(1);
            
            return { 
              currentMonthIndex,
              totalMonths: totalLunarMonths,
              monthProgress,
              percent
            };
          }

          // 七曜
          function getJapaneseDayOfWeek(date) {
            const day = date.getDay();
            const sevenLights = ['日曜', '月曜', '火曜', '水曜', '木曜', '金曜', '土曜'];
            return sevenLights[day];
          }

          // ✅ 新增：获取农历月的准确天数
          function getLunarMonthDays(lunarYear, lunarMonth, isLeap) {
            const month = LunarMonth.fromYmd(lunarYear, lunarMonth, isLeap);
            return month.getDayCount();
          }

          async function main() {
            try {
              const beijingTime = getBeijingTime();
              
              const year = beijingTime.getFullYear();
              const month = String(beijingTime.getMonth() + 1).padStart(2, '0');
              const day = String(beijingTime.getDate()).padStart(2, '0');
              const dateStr = \`\${year}-\${month}-\${day}\`;
              
              const hour = beijingTime.getHours();
              const minute = beijingTime.getMinutes();
              const hourIndex = hour + 1;
              const timeStr = \`\${hour}:\${minute === 0 ? '00' : '30'}\`;
              
              // 计算农历
              const solar = Solar.fromDate(beijingTime);
              const lunar = solar.getLunar();
              
              const lunarYear = lunar.getYear();
              const lunarYearGanZhi = lunar.getYearInGanZhi();
              const lunarMonth = lunar.getMonth();
              const lunarMonthName = lunar.getMonthInChinese();
              const lunarDayName = lunar.getDayInChinese();
              const isLeap = lunar.isLeap();
              
              let lunarMonthNum = lunarMonth;
              if (lunarMonthNum < 0) lunarMonthNum = Math.abs(lunarMonthNum);
              
              const lunarDayNum = chineseDayToNumber(lunarDayName);
              const moonEmoji = getMoonEmoji(lunarDayNum);
              
              // ✅ 获取这个农历月的准确天数
              const monthDays = getLunarMonthDays(lunarYear, lunarMonthNum, isLeap);
              
              const festivals = lunar.getFestivals();
              const gregorianFestivals = solar.getFestivals();
              const jieQi = lunar.getJieQi();
              const shengxiao = lunar.getYearShengXiao();
              
              const lifeProgress = calculateLifeProgress(beijingTime);
              const japaneseWeekDay = getJapaneseDayOfWeek(beijingTime);
              
              // 日进度条
              const dayProgress = (hourIndex / 24 * 100).toFixed(1);
              const dayFilled = Math.floor((hourIndex / 24) * 20);
              const dayBar = '█'.repeat(dayFilled) + '░'.repeat(20 - dayFilled);
              
              // ✅ 月进度条（用准确的农历月天数）
              const monthProgress = (lunarDayNum / monthDays * 100).toFixed(1);
              const monthFilled = Math.floor((lunarDayNum / monthDays) * 20);
              const monthBar = '█'.repeat(monthFilled) + '░'.repeat(20 - monthFilled);
              
              // 年进度条
              const yearProgress = (((lunarMonthNum - 1 + lunarDayNum / monthDays) / 12) * 100).toFixed(1);
              const yearFilled = Math.floor(((lunarMonthNum - 1 + lunarDayNum / monthDays) / 12) * 20);
              const yearBar = '█'.repeat(yearFilled) + '░'.repeat(20 - yearFilled);
              
              // 人生进度条
              const lifeFilled = Math.floor((lifeProgress.percent / 100) * 20);
              const lifeBar = '█'.repeat(lifeFilled) + '░'.repeat(20 - lifeFilled);
              
              // 完整标题
              const fullTitle = \`\${moonEmoji} [\${hourIndex}/24] \${timeStr} 贰伍 \${japaneseWeekDay} · \${lunarMonthName}\${lunarDayName}\`;
              
              // 邮件标题
              const emailSubject = \`今天是\${lunarMonthName}\${lunarDayName}。\${japaneseWeekDay}。 记得贰伍\`;
              
              const content = 
                '📊 **今日时间进度**\\n' +
                '┌────────────────────\\n' +
                '│ ' + dayBar + ' ' + dayProgress + '%\\n' +
                '│ 第 ' + hourIndex + '/24 小时\\n' +
                '│ 剩余 ' + (24 - hourIndex) + ' 小时\\n' +
                '└────────────────────\\n\\n' +
                
                '🎯 **人生任务**\\n' +
                '今日运动目标：**贰拾伍分钟 (25min)**\\n' +
                '时刻提醒：**贰伍**\\n\\n' +
                
                '🌙 **人生进度**\\n' +
                '出生：1995-01-22\\n' +
                '当前：第 ' + lifeProgress.currentMonthIndex + ' 个农历月\\n' +
                '本月进度：' + lifeProgress.monthProgress + '%\\n' +
                '总农历月：' + lifeProgress.totalMonths + '\\n' +
                '人生已完成：' + lifeProgress.percent + '%\\n' +
                '人生：' + lifeBar + ' ' + lifeProgress.percent + '%\\n\\n' +
                
                '📅 **农历信息**\\n' +
                '公历：**' + dateStr + '** (' + japaneseWeekDay + ')\\n' +
                '农历：**' + lunarYearGanZhi + '年 ' + (isLeap ? '闰' : '') + lunarMonthName + lunarDayName + '** ' + moonEmoji + '\\n' +
                '生肖：🐴 ' + shengxiao + '\\n' +
                '节气：' + (jieQi || '无') + '\\n\\n' +
                
                '📊 **进度一览**\\n' +
                '日：' + dayBar + ' ' + dayProgress + '%\\n' +
                '月：' + monthBar + ' ' + monthProgress + '% (第' + lunarDayNum + '/' + monthDays + '天)\\n' +
                '年：' + yearBar + ' ' + yearProgress + '%\\n' +
                '人生：' + lifeBar + ' ' + lifeProgress.percent + '%\\n\\n' +
                
                '🎉 **节日**\\n' +
                '农历节日：' + (festivals.length > 0 ? festivals.join('、') : '无') + '\\n' +
                '公历节日：' + (gregorianFestivals.length > 0 ? gregorianFestivals.join('、') : '无') + '\\n\\n' +
                
                '⏰ **时间标记**\\n' +
                '推送时间：' + timeStr + ' (北京时间)\\n' +
                '当日序号：' + hourIndex + '/24\\n' +
                '年度第：' + Math.floor((beijingTime - new Date(beijingTime.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24)) + '天\\n' +
                '七曜：' + japaneseWeekDay + '\\n\\n' +
                
                '💪 _记得完成今日贰拾伍分钟运动任务！_\\n' +
                '💫 _KTBFFH - 我的农历人生追踪_';
              
              // 保存文件
              fs.writeFileSync('email_content.txt', fullTitle + '\\n\\n' + content);
              fs.writeFileSync('email_subject.txt', emailSubject);
              
            } catch (error) {
              console.error('❌ 运行失败:', error.message);
              throw error;
            }
          }

          main();
          "
      
      - name: 读取邮件标题
        id: read_subject
        run: echo "subject=$(cat email_subject.txt)" >> $GITHUB_OUTPUT
      
      - name: 发送邮件
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.qq.com
          server_port: 587
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: ${{steps.read_subject.outputs.subject}}
          to: 1203402652@qq.com
          from: 七耀运行
          body: file://email_content.txt
