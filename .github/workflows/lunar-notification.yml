name: Lunar Calendar Notification

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install axios
        run: |
          npm init -y
          npm install axios
      
      - name: Fetch Data and Push Notification
        run: |
          node -e "
          const axios = require('axios');
          const TIANXING_KEY = 'ddb46cc2067829e975734869fdf36969'; 
          const SERVERCHAN_KEY = 'SCT319191TZCCMQhVq74ajaCWlXYpm9FYE';

          async function main() {
            try {
              const now = new Date();
              const dateStr = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' })).toISOString().split('T')[0];
              
              console.log('📅 正在查询日期: ' + dateStr);
              
              const lunarRes = await axios.get('https://apis.tianapi.com/lunar/index', {
                params: { key: TIANXING_KEY, date: dateStr }
              });
              
              if (lunarRes.data.code !== 200) {
                throw new Error('API 返回错误: ' + (lunarRes.data.msg || '未知错误'));
              }
              
              const r = lunarRes.data.result;
              
              // 打印返回的数据，方便调试
              console.log('✅ API返回成功');
              console.log('农历:', r.lmonthname + r.lubarmonth + r.lunarday);
              console.log('干支:', r.tiangandizhiyear, r.tiangandizhimonth, r.tiangandizhiday);
              
              // 拼接农历日期
              const lunarDate = r.lmonthname + r.lubarmonth + r.lunarday;
              const title = '📅 今日农历：' + lunarDate;
              
              // 处理宜忌
              const fitness = r.fitness ? r.fitness.split('.').join('、') : '无';
              const taboo = r.taboo ? r.taboo.split('.').join('、') : '无';
              
              const content = 
                '公历：**' + dateStr + '**\\n' +
                '农历：**' + lunarDate + '**\\n' +
                '干支：' + r.tiangandizhiyear + '年 ' + r.tiangandizhimonth + '月 ' + r.tiangandizhiday + '日\\n' +
                '生肖：🐴 ' + r.shengxiao + '\\n' +
                '冲煞：' + r.chongsha + '\\n' +
                '胎神：' + r.taishen + '\\n\\n' +
                '✅ **宜**：' + fitness + '\\n' +
                '❌ **忌**：' + taboo + '\\n\\n' +
                '彭祖百忌：' + r.pengzu + '\\n' +
                '星宿：' + r.xingsu + '\\n' +
                '五行：' + r.wuxingnayear + ' | ' + r.wuxingnamonth + ' | ' + r.wuxingjiazi + '\\n\\n' +
                '_由 GitHub 机器人自动推送，祝你今天好运！_';
              
              console.log('📤 正在发送通知...');
              
              const pushRes = await axios.post('https://sctapi.ftqq.com/' + SERVERCHAN_KEY + '.send', null, {
                params: {
                  title: title,
                  desp: content,
                  channel: 9 
                }
              });

              if (pushRes.data.code === 0) {
                console.log('✅ 推送成功！');
              } else {
                throw new Error('ServerChan 返回错误: ' + pushRes.data.message);
              }

            } catch (error) {
              console.error('❌ 运行失败:', error.message);
              throw error;
            }
          }

          main();
          "
